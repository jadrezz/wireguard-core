# This workflow will build a golang project and create a release on tag push
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    tags:
      - 'v*'

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build Linux binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o wireguard-core-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o wireguard-core-linux-arm64 ./cmd

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wireguard-core-linux-amd64
            wireguard-core-linux-arm64
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}