name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o wireguard-core-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -o wireguard-core-linux-arm64 ./cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wireguard-core-linux-amd64
            wireguard-core-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}